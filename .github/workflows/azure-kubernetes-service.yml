name: Build and deploy an app to AKS

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  AZURE_CONTAINER_REGISTRY: "acswppmesh1771568067"
  CONTAINER_NAME: "manus-copilot-integration"
  RESOURCE_GROUP: "acs-wpp-mesh-rg"
  CLUSTER_NAME: "manus-copilot-aks"
  DEPLOYMENT_MANIFEST_PATH: "deployments/kubernetes/deployment.yml"

jobs:
  validate-secrets:
    name: Validate Required Secrets
    runs-on: ubuntu-latest
    outputs:
      secrets-configured: ${{ steps.check.outputs.configured }}
    steps:
      - name: Check required secrets
        id: check
        run: |
          if [[ -z "${{ secrets.AZURE_CLIENT_ID }}" ]] || \
             [[ -z "${{ secrets.AZURE_TENANT_ID }}" ]] || \
             [[ -z "${{ secrets.AZURE_SUBSCRIPTION_ID }}" ]]; then
            echo "configured=false" >> $GITHUB_OUTPUT
            echo "::warning::Azure secrets not configured. Skipping AKS deploy."
            echo "## AKS Deploy Skipped" >> $GITHUB_STEP_SUMMARY
            echo "Required secrets not configured:" >> $GITHUB_STEP_SUMMARY
            echo "- AZURE_CLIENT_ID" >> $GITHUB_STEP_SUMMARY
            echo "- AZURE_TENANT_ID" >> $GITHUB_STEP_SUMMARY
            echo "- AZURE_SUBSCRIPTION_ID" >> $GITHUB_STEP_SUMMARY
          else
            echo "configured=true" >> $GITHUB_OUTPUT
          fi

  buildImage:
    name: Build and Push to ACR
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    needs: validate-secrets
    if: needs.validate-secrets.outputs.secrets-configured == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build and push image to ACR
        run: |
          az acr build \
            --image ${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io/${{ env.CONTAINER_NAME }}:${{ github.sha }} \
            --registry ${{ env.AZURE_CONTAINER_REGISTRY }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            .

  deploy:
    name: Deploy to AKS
    permissions:
      actions: read
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    needs: [validate-secrets, buildImage]
    if: needs.validate-secrets.outputs.secrets-configured == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set up kubelogin for non-interactive login
        uses: azure/use-kubelogin@v1
        with:
          kubelogin-version: "v0.0.25"

      - name: Get K8s context
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ env.RESOURCE_GROUP }}
          cluster-name: ${{ env.CLUSTER_NAME }}
          admin: "false"
          use-kubelogin: "true"

      - name: Deploy to AKS
        uses: Azure/k8s-deploy@v4
        with:
          action: deploy
          manifests: ${{ env.DEPLOYMENT_MANIFEST_PATH }}
          images: |
            ${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io/${{ env.CONTAINER_NAME }}:${{ github.sha }}
