name: the-mithy-of-the-infinity

on:
  push:
    branches: ["main"]
    paths:
      - "cmd/server/**"
      - "internal/**"
      - "pkg/**"
      - "go.mod"
      - "go.sum"
      - "packages/the-mithy-of-the-infinity/**"
      - ".github/workflows/the-mithy-of-the-infinity.yml"
  workflow_dispatch:
    inputs:
      deploy_target:
        description: "Deploy target (aci / aks / ghcr-only)"
        required: false
        default: "ghcr-only"

env:
  PACKAGE_NAME: the-mithy-of-the-infinity
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/the-mithy-of-the-infinity
  DOCKERFILE: packages/the-mithy-of-the-infinity/Dockerfile
  AZURE_RESOURCE_GROUP: acs-wpp-mesh-rg
  AZURE_ACR: acswppmesh1771568067
  ACI_NAME: the-mithy-of-the-infinity
  ACI_DNS_LABEL: the-mithy-of-the-infinity

jobs:
  # ─────────────────────────────────────────
  # Job 1a: Lint & Vet (parallel with test)
  # ─────────────────────────────────────────
  lint:
    name: Lint & Vet — Go 1.22
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Run go vet
        run: go vet ./...

      - name: Run staticcheck
        uses: dominikh/staticcheck-action@v1
        with:
          version: "latest"
          install-go: false

  # ─────────────────────────────────────────
  # Job 1b: Unit Tests (parallel with lint)
  # ─────────────────────────────────────────
  test:
    name: Test — Go 1.22
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Run tests
        run: go test ./... -race -cover -coverprofile=coverage.out

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out
          retention-days: 7

  # ─────────────────────────────────────────
  # Job 1c: Build binary check (parallel)
  # ─────────────────────────────────────────
  build-check:
    name: Build Check — Go 1.22
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Build binary
        run: go build -v -o /tmp/manus-server ./cmd/server/

      - name: Verify binary
        run: /tmp/manus-server --version || echo "Binary built successfully"

  # ─────────────────────────────────────────
  # Job 2: Build & Push to GHCR
  # (only after all parallel checks pass)
  # ─────────────────────────────────────────
  build-and-push:
    name: Build & Push — the-mithy-of-the-infinity
    runs-on: ubuntu-latest
    needs: [lint, test, build-check]
    permissions:
      contents: read
      packages: write
      id-token: write
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-tag: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=1.0.0,enable=${{ github.ref == 'refs/heads/main' }}
          labels: |
            org.opencontainers.image.title=The Myth of the Infinity
            org.opencontainers.image.description=Manus Copilot Mission Control — Interplanetary Superintelligence
            com.manus.package=the-mithy-of-the-infinity
            com.manus.scope=interplanetary

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ env.DOCKERFILE }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_VERSION=1.0.0
            BUILD_COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            PACKAGE_NAME=${{ env.PACKAGE_NAME }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true
          platforms: linux/amd64

      - name: Write build summary
        run: |
          echo "## 🌌 the-mithy-of-the-infinity" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Image** | \`${{ env.IMAGE_NAME }}:latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Digest** | \`${{ steps.build.outputs.digest }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Package** | \`the-mithy-of-the-infinity\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Scope** | Interplanetary (Earth → Moon → Mars) |" >> $GITHUB_STEP_SUMMARY

  # ─────────────────────────────────────────
  # Job 3a: Security Scan (parallel with notify)
  # ─────────────────────────────────────────
  security-scan:
    name: Security Scan — Trivy
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.IMAGE_NAME }}:latest"
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Trivy scan results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-results.sarif"

  # ─────────────────────────────────────────
  # Job 3b: SBOM & Provenance (parallel with scan)
  # ─────────────────────────────────────────
  sbom-sign:
    name: SBOM & Sign — Cosign
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sign image with Cosign (keyless)
        run: |
          cosign sign --yes \
            ${{ env.IMAGE_NAME }}@${{ needs.build-and-push.outputs.image-digest }}

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE_NAME }}:latest
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-spdx
          path: sbom.spdx.json
          retention-days: 30

  # ─────────────────────────────────────────
  # Job 4: Deploy to Azure Container Instances
  # (only after security + sbom pass)
  # ─────────────────────────────────────────
  deploy-aci:
    name: Deploy — Azure Container Instances
    runs-on: ubuntu-latest
    needs: [build-and-push, security-scan]
    if: >
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || github.event.inputs.deploy_target == 'aci')
    environment:
      name: production
      url: http://${{ env.ACI_DNS_LABEL }}.eastus.azurecontainer.io:8080/health
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Container Instances
        run: |
          az container create \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --name ${{ env.ACI_NAME }} \
            --image ${{ env.IMAGE_NAME }}:latest \
            --registry-server ghcr.io \
            --registry-username ${{ github.actor }} \
            --registry-password ${{ secrets.GITHUB_TOKEN }} \
            --dns-name-label ${{ env.ACI_DNS_LABEL }} \
            --ports 8080 \
            --cpu 1 \
            --memory 1.5 \
            --environment-variables \
              SERVER_ENV=production \
              PACKAGE_NAME=the-mithy-of-the-infinity \
              MANUS_ENABLE_PLANETARY=true \
            --restart-policy Always \
            --location eastus \
            --os-type Linux \
            --output table

      - name: Verify deployment health
        run: |
          echo "Waiting for container to start..."
          sleep 30
          URL="http://${{ env.ACI_DNS_LABEL }}.eastus.azurecontainer.io:8080/health"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL" || echo "000")
          echo "Health check status: $STATUS"
          if [[ "$STATUS" == "200" ]]; then
            echo "✅ Deployment healthy at $URL" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Health check returned $STATUS — container may still be starting" >> $GITHUB_STEP_SUMMARY
          fi
