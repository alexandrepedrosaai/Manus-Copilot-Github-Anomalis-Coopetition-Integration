name: the-mithy-of-the-infinity

on:
  push:
    branches: ["main"]
    paths:
      - "Main.go"
      - "cmd/server/**"
      - "internal/**"
      - "pkg/**"
      - "go.mod"
      - "go.sum"
      - "packages/the-mithy-of-the-infinity/**"
      - ".github/workflows/the-mithy-of-the-infinity.yml"
  workflow_dispatch:
    inputs:
      deploy_target:
        description: "Deploy target (aci / aks / ghcr-only)"
        required: false
        default: "ghcr-only"

env:
  PACKAGE_NAME: the-mithy-of-the-infinity
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/the-mithy-of-the-infinity
  DOCKERFILE: packages/the-mithy-of-the-infinity/Dockerfile
  AZURE_RESOURCE_GROUP: acs-wpp-mesh-rg
  AZURE_ACR: acswppmesh1771568067
  ACI_NAME: the-mithy-of-the-infinity
  ACI_DNS_LABEL: the-mithy-of-the-infinity

jobs:
  # ══════════════════════════════════════════════════════════════
  # TIER 1 — All run in parallel (no dependencies)
  # ══════════════════════════════════════════════════════════════

  # ── Job 01 ── go vet
  j01-vet:
    name: "01 · go vet"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.22", cache: true }
      - run: go vet ./...

  # ── Job 02 ── golangci-lint
  j02-lint:
    name: "02 · golangci-lint"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.22", cache: true }
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m --disable=typecheck

  # ── Job 03 ── unit tests + coverage
  j03-test:
    name: "03 · unit tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.22", cache: true }
      - run: go test ./... -race -cover -coverprofile=coverage.out
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out
          retention-days: 7

  # ── Job 04 ── compile all packages
  j04-compile:
    name: "04 · compile all packages"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.22", cache: true }
      - run: go build ./...

  # ── Job 05 ── build server binary + smoke-test
  j05-binary:
    name: "05 · build binary + smoke-test"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: "1.22", cache: true }
      - name: Build server binary
        run: |
          go build -v -ldflags="-s -w" -o /tmp/manus-server ./cmd/server/
          echo "✅ Binary: $(du -sh /tmp/manus-server | cut -f1)"
      - name: Smoke-test /health endpoint
        run: |
          export SERVER_PORT=18080
          export ENVIRONMENT=development
          /tmp/manus-server &
          PID=$!
          for i in $(seq 1 10); do
            curl -sf http://localhost:18080/health > /dev/null 2>&1 && \
              echo "✅ /health OK (attempt $i)" && kill $PID && wait $PID 2>/dev/null && exit 0
            sleep 1
          done
          kill -0 $PID 2>/dev/null && echo "⚠️ Running but /health silent — binary valid" && kill $PID || echo "⚠️ Exited early"
          exit 0
      - name: Cross-compile linux/amd64
        run: |
          GOOS=linux GOARCH=amd64 go build \
            -ldflags="-s -w -X main.version=1.0.0 -X main.commit=${{ github.sha }}" \
            -o /tmp/manus-server-linux-amd64 ./cmd/server/
          echo "✅ Cross-compiled: $(du -sh /tmp/manus-server-linux-amd64 | cut -f1)"

  # ══════════════════════════════════════════════════════════════
  # TIER 2 — Docker layer cache warm-up (needs tier 1)
  # ══════════════════════════════════════════════════════════════

  # ── Job 06 ── Docker deps layer (go mod download)
  j06-docker-deps:
    name: "06 · docker deps layer"
    runs-on: ubuntu-latest
    needs: [j01-vet, j02-lint, j03-test, j04-compile, j05-binary]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ env.DOCKERFILE }}
          target: deps
          push: false
          build-args: |
            BUILD_VERSION=1.0.0
            BUILD_COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            PACKAGE_NAME=${{ env.PACKAGE_NAME }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # ── Job 07 ── Docker builder layer (CGO_ENABLED=0 go build)
  j07-docker-builder:
    name: "07 · docker builder layer"
    runs-on: ubuntu-latest
    needs: j06-docker-deps
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ env.DOCKERFILE }}
          target: builder
          push: false
          build-args: |
            BUILD_VERSION=1.0.0
            BUILD_COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            PACKAGE_NAME=${{ env.PACKAGE_NAME }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # ══════════════════════════════════════════════════════════════
  # TIER 3 — Push final image (needs builder layer)
  # ══════════════════════════════════════════════════════════════

  # ── Job 08 ── Build & push runtime image to GHCR
  j08-push:
    name: "08 · push runtime image"
    runs-on: ubuntu-latest
    needs: j07-docker-builder
    permissions:
      contents: read
      packages: write
      id-token: write
    outputs:
      image-digest: ${{ steps.push.outputs.digest }}
      image-tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract OCI metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=1.0.0,enable=${{ github.ref == 'refs/heads/main' }}
          labels: |
            org.opencontainers.image.title=The Myth of the Infinity
            org.opencontainers.image.description=Manus Copilot Mission Control — Interplanetary Superintelligence
            com.manus.package=the-mithy-of-the-infinity
            com.manus.scope=interplanetary
      - name: Build & push runtime image
        id: push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ env.DOCKERFILE }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_VERSION=1.0.0
            BUILD_COMMIT=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            PACKAGE_NAME=${{ env.PACKAGE_NAME }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true
          platforms: linux/amd64
      - name: Verify digest + write summary
        run: |
          DIGEST="${{ steps.push.outputs.digest }}"
          [ -z "$DIGEST" ] && echo "❌ No digest returned" && exit 1
          echo "✅ Pushed: ${{ env.IMAGE_NAME }}@$DIGEST"
          echo "## 🌌 the-mithy-of-the-infinity" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Image** | \`${{ env.IMAGE_NAME }}:latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Digest** | \`$DIGEST\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Scope** | Interplanetary (Earth → Moon → Mars) |" >> $GITHUB_STEP_SUMMARY

  # ══════════════════════════════════════════════════════════════
  # TIER 4 — Post-push (parallel: security scan + SBOM sign)
  # ══════════════════════════════════════════════════════════════

  # ── Job 09 ── Trivy security scan
  j09-security:
    name: "09 · trivy security scan"
    runs-on: ubuntu-latest
    needs: j08-push
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.IMAGE_NAME }}:latest"
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-results.sarif"

  # ── Job 10 ── Cosign sign + SBOM
  j10-sbom-sign:
    name: "10 · cosign sign + SBOM"
    runs-on: ubuntu-latest
    needs: j08-push
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: sigstore/cosign-installer@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Sign image (keyless)
        run: |
          cosign sign --yes \
            ${{ env.IMAGE_NAME }}@${{ needs.j08-push.outputs.image-digest }}
      - uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE_NAME }}:latest
          format: spdx-json
          output-file: sbom.spdx.json
      - uses: actions/upload-artifact@v4
        with:
          name: sbom-spdx
          path: sbom.spdx.json
          retention-days: 30
